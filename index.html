<!DOCTYPE html>
<html>
<head>
  <title>Rayaru Infotech</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; margin: 0; background: #f5f5f5; }
    header { background: #222; color: white; padding: 15px; text-align: center; }
    section { padding: 20px; }
    .card { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; }
    input, select, textarea {
      width: 100%; padding: 10px; margin: 8px 0;
      border-radius: 5px; border: 1px solid #ccc;
    }
    button {
      background: #28a745; color: white;
      padding: 10px; border: none; border-radius: 5px;
      cursor: pointer;
    }
    .whatsapp {
      position: fixed; bottom: 20px; right: 20px;
      background: green; color: white;
      padding: 12px 15px; border-radius: 50%;
      text-decoration: none;
      font-size: 18px;
    }
  </style>
</head>

<body>

<header>
  <h2>Rayaru Infotech</h2>
</header>

<section>
  <div class="card">
    <h3>Welcome to Our Services</h3>
    <p>
      We offer trusted DTDC courier services, professional laptop repair and maintenance,
      and reliable CCTV installation for homes and businesses.
    </p>
  </div>

  <div class="card">
    <h3>Our Services</h3>
    <ul>
      <li>📦 DTDC Courier Services</li>
      <li>💻 Laptop Repair & Sales</li>
      <li>📹 CCTV Installation</li>
    </ul>
  </div>

  <div class="card">
    <h3>Contact Us</h3>
    <form id="leadForm">
      <input type="text" id="name" placeholder="Your Name" required>
      <input type="tel" id="phone" placeholder="Phone Number" required>
      
      <select id="service">
        <option>DTDC Courier</option>
        <option>Laptop Service</option>
        <option>CCTV Installation</option>
      </select>

      <textarea id="message" placeholder="Your Message"></textarea>
      <button type="submit">Submit</button>
    </form>
  </div>
</section>

<a class="whatsapp" href="https://wa.me/919999999999" target="_blank">💬</a>

<script>
const scriptURL = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

document.getElementById("leadForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const data = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    service: document.getElementById("service").value,
    message: document.getElementById("message").value
  };

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(() => {
    alert("Submitted successfully!");
    document.getElementById("leadForm").reset();
  })
  .catch(err => alert("Error: " + err));
});
</script>

</body>
</html>
